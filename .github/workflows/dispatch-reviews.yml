name: Dispatch Reviews After Fixer

# Full orchestrator: dispatch reviews, poll for completion, dispatch aggregator.
#
# Triggers:
# 1. AWF fixer/iteration agent completes (workflow_run)
# 2. Copilot PR becomes ready for review (pull_request: ready_for_review)
# 3. Copilot pushes iteration commits (push to copilot/* branches)
#
# MAX_ITERATIONS guard in "Check if iteration needed" prevents infinite loops.

on:
  workflow_run:
    workflows: ["Fix Issue Agent", "Fix Iteration Agent"]
    types: [completed]
  pull_request:
    types: [ready_for_review]
  push:
    branches:
      - 'copilot/**'

jobs:
  orchestrate-reviews:
    # For workflow_run: only on success
    # For pull_request/push: always run (guards below filter non-Copilot PRs)
    if: >-
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'pull_request' ||
      github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Find PR
        id: find-pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            # Copilot PR ready for review
            AUTHOR="${{ github.event.pull_request.user.login }}"
            if [[ "$AUTHOR" != "copilot-swe-agent[bot]" ]]; then
              echo "Not a Copilot PR (author: $AUTHOR), skipping"
              echo "found=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            PR_NUM="${{ github.event.pull_request.number }}"
            FILES="${{ github.event.pull_request.changed_files }}"
            if [ "$FILES" -eq 0 ] 2>/dev/null; then
              echo "Copilot PR #$PR_NUM has no files yet, skipping"
              echo "found=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Copilot PR #$PR_NUM ready for review ($FILES files)"
            # Add ai:copilot-fix label if not present
            gh api "repos/${{ github.repository }}/issues/$PR_NUM/labels" \
              -X POST --input - <<< '{"labels":["ai:copilot-fix"]}' > /dev/null 2>&1 || true
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"

          elif [ "${{ github.event_name }}" == "push" ]; then
            # Push to copilot/* branch — find associated open PR
            BRANCH="${{ github.ref_name }}"
            echo "Push to branch: $BRANCH"
            PR_NUM=$(gh api "repos/${{ github.repository }}/pulls?state=open&head=${{ github.repository_owner }}:$BRANCH&per_page=1" \
              --jq '.[0].number // empty')
            if [ -z "$PR_NUM" ]; then
              echo "No open PR for branch $BRANCH"
              echo "found=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            AUTHOR=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUM" --jq '.user.login')
            if [[ "$AUTHOR" != "copilot-swe-agent[bot]" ]]; then
              echo "PR #$PR_NUM not by Copilot (author: $AUTHOR), skipping"
              echo "found=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Copilot iteration push to PR #$PR_NUM"
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"

          else
            # workflow_run trigger (AWF fixer/iteration agent)
            RUN_ID="${{ github.event.workflow_run.id }}"
            echo "Fixer run: $RUN_ID"

            # Find the most recently opened PR with ai:agent-fix label
            PR_NUM=$(gh api "repos/${{ github.repository }}/pulls?state=open&sort=created&direction=desc&per_page=5" \
              --jq '[.[] | select(.labels | map(.name) | index("ai:agent-fix"))] | .[0].number // empty')

            if [ -z "$PR_NUM" ]; then
              echo "No ai:agent-fix PR found"
              echo "found=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Found PR #$PR_NUM"
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"

      - name: Dispatch Code Review
        if: steps.find-pr.outputs.found == 'true'
        id: dispatch-cr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ steps.find-pr.outputs.pr_number }}"
          echo "Dispatching Code Review for PR #$PR_NUM"
          gh workflow run code-review.lock.yml \
            -R "${{ github.repository }}" \
            -f "pr_number=$PR_NUM"
          echo "✅ Code Review dispatched"

          # Wait a moment then find the run ID
          sleep 15
          CR_RUN=$(gh api "repos/${{ github.repository }}/actions/workflows/code-review.lock.yml/runs?per_page=5&status=in_progress" \
            --jq '[.workflow_runs[] | select(.created_at > (now - 120 | todate))] | .[0].id // empty' 2>/dev/null || true)
          if [ -z "$CR_RUN" ]; then
            CR_RUN=$(gh api "repos/${{ github.repository }}/actions/workflows/code-review.lock.yml/runs?per_page=5&status=queued" \
              --jq '[.workflow_runs[] | select(.created_at > (now - 120 | todate))] | .[0].id // empty' 2>/dev/null || true)
          fi
          echo "Code Review run ID: $CR_RUN"
          echo "run_id=$CR_RUN" >> "$GITHUB_OUTPUT"

      - name: Dispatch API Review
        if: steps.find-pr.outputs.found == 'true'
        id: dispatch-ar
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ steps.find-pr.outputs.pr_number }}"
          echo "Dispatching API Surface Review for PR #$PR_NUM"
          gh workflow run api-review.lock.yml \
            -R "${{ github.repository }}" \
            -f "pr_number=$PR_NUM"
          echo "✅ API Surface Review dispatched"

          sleep 15
          AR_RUN=$(gh api "repos/${{ github.repository }}/actions/workflows/api-review.lock.yml/runs?per_page=5&status=in_progress" \
            --jq '[.workflow_runs[] | select(.created_at > (now - 120 | todate))] | .[0].id // empty' 2>/dev/null || true)
          if [ -z "$AR_RUN" ]; then
            AR_RUN=$(gh api "repos/${{ github.repository }}/actions/workflows/api-review.lock.yml/runs?per_page=5&status=queued" \
              --jq '[.workflow_runs[] | select(.created_at > (now - 120 | todate))] | .[0].id // empty' 2>/dev/null || true)
          fi
          echo "API Review run ID: $AR_RUN"
          echo "run_id=$AR_RUN" >> "$GITHUB_OUTPUT"

      - name: Wait for both reviews to complete
        if: steps.find-pr.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CR_RUN="${{ steps.dispatch-cr.outputs.run_id }}"
          AR_RUN="${{ steps.dispatch-ar.outputs.run_id }}"

          echo "Waiting for Code Review ($CR_RUN) and API Review ($AR_RUN)..."

          CR_DONE=false
          AR_DONE=false

          for i in $(seq 1 40); do
            if [ "$CR_DONE" = "false" ] && [ -n "$CR_RUN" ]; then
              CR_STATUS=$(gh api "repos/${{ github.repository }}/actions/runs/$CR_RUN" --jq '.status' 2>/dev/null || echo "unknown")
              if [ "$CR_STATUS" = "completed" ]; then
                CR_DONE=true
                echo "✅ Code Review completed"
              fi
            fi

            if [ "$AR_DONE" = "false" ] && [ -n "$AR_RUN" ]; then
              AR_STATUS=$(gh api "repos/${{ github.repository }}/actions/runs/$AR_RUN" --jq '.status' 2>/dev/null || echo "unknown")
              if [ "$AR_STATUS" = "completed" ]; then
                AR_DONE=true
                echo "✅ API Review completed"
              fi
            fi

            if [ "$CR_DONE" = "true" ] && [ "$AR_DONE" = "true" ]; then
              echo "Both reviews completed!"
              exit 0
            fi

            echo "Poll $i/40: CR=$CR_DONE AR=$AR_DONE (sleeping 60s)"
            sleep 60
          done

          echo "::warning::Timed out waiting for reviews after 40 min"
          exit 1

      # ── Phase 2: Dispatch Aggregator ───────────────────────────

      - name: Dispatch Review Aggregator
        if: steps.find-pr.outputs.found == 'true'
        id: dispatch-agg
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ steps.find-pr.outputs.pr_number }}"
          echo "Dispatching Review Aggregator for PR #$PR_NUM"
          gh workflow run review-aggregator.lock.yml \
            -R "${{ github.repository }}" \
            -f "pr_number=$PR_NUM"
          echo "✅ Aggregator dispatched"

          sleep 15
          AGG_RUN=$(gh api "repos/${{ github.repository }}/actions/workflows/review-aggregator.lock.yml/runs?per_page=5" \
            --jq '[.workflow_runs[] | select(.status != "completed") | select(.created_at > (now - 120 | todate))] | .[0].id // empty' 2>/dev/null || true)
          echo "Aggregator run ID: $AGG_RUN"
          echo "run_id=$AGG_RUN" >> "$GITHUB_OUTPUT"

      - name: Wait for aggregator to complete
        if: steps.find-pr.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          AGG_RUN="${{ steps.dispatch-agg.outputs.run_id }}"
          echo "Waiting for Aggregator ($AGG_RUN)..."

          for i in $(seq 1 20); do
            if [ -n "$AGG_RUN" ]; then
              STATUS=$(gh api "repos/${{ github.repository }}/actions/runs/$AGG_RUN" --jq '.status' 2>/dev/null || echo "unknown")
              if [ "$STATUS" = "completed" ]; then
                CONCLUSION=$(gh api "repos/${{ github.repository }}/actions/runs/$AGG_RUN" --jq '.conclusion' 2>/dev/null)
                echo "✅ Aggregator completed: $CONCLUSION"
                exit 0
              fi
            fi

            echo "Poll $i/20: status=$STATUS (sleeping 30s)"
            sleep 30
          done

          echo "::warning::Timed out waiting for aggregator after 10 min"
          exit 1

      # ── Phase 3: Dispatch Iteration (if needed) ────────────────

      - name: Check if iteration needed
        if: steps.find-pr.outputs.found == 'true'
        id: check-iteration
        env:
          GH_TOKEN: ${{ github.token }}
          MAX_ITERATIONS: 3
        run: |
          PR_NUM="${{ steps.find-pr.outputs.pr_number }}"

          LABELS=$(gh api "repos/${{ github.repository }}/issues/$PR_NUM/labels" \
            --jq '[.[].name] | join(",")')
          echo "PR #$PR_NUM labels: $LABELS"

          if ! echo "$LABELS" | grep -q "ai:needs-iteration"; then
            echo "No ai:needs-iteration label — pipeline complete"
            echo "needs_iteration=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check iteration count
          ITER_COUNT=$(gh api "repos/${{ github.repository }}/issues/$PR_NUM/comments?per_page=100" \
            --jq '[.[] | select(.body | test("Iteration.*Applied|push_to_pull_request"; "i"))] | length')
          echo "Iteration count: $ITER_COUNT (max: $MAX_ITERATIONS)"

          if [ "$ITER_COUNT" -ge "$MAX_ITERATIONS" ]; then
            echo "Max iterations reached — stopping loop"
            gh api "repos/${{ github.repository }}/issues/$PR_NUM/labels" \
              -X POST --input - <<< '{"labels":["ai:max-iterations-reached"]}' > /dev/null
            echo "needs_iteration=false" >> "$GITHUB_OUTPUT"
          else
            echo "needs_iteration=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract fix instructions
        if: steps.check-iteration.outputs.needs_iteration == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ steps.find-pr.outputs.pr_number }}"

          BODY=$(gh api "repos/${{ github.repository }}/issues/$PR_NUM/comments?per_page=100" \
            --jq '[.[] | select(.body | test("Review|review|API Surface"; "i"))] | map(.body) | join("\n\n---\n\n") // empty')

          if [ -z "$BODY" ] || [ "$BODY" = "null" ]; then
            BODY="Address the review feedback on this PR. Read the review comments carefully and fix all issues identified."
          fi

          echo "$BODY" | head -c 65000 > /tmp/fix_instructions.txt

      - name: Dispatch iteration agent
        if: steps.check-iteration.outputs.needs_iteration == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ steps.find-pr.outputs.pr_number }}"
          INSTRUCTIONS=$(cat /tmp/fix_instructions.txt)

          echo "Dispatching iteration agent for PR #$PR_NUM"
          gh workflow run agentic-fix-iterate.lock.yml \
            -R "${{ github.repository }}" \
            -f "pr_number=$PR_NUM" \
            -f "fix_instructions=$INSTRUCTIONS" \
            -f "upstream_repo=dotnet/runtime"
          echo "✅ Iteration agent dispatched for PR #$PR_NUM"
