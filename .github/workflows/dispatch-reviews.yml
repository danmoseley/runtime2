name: Dispatch Reviews After Fixer

# Full orchestrator: dispatch reviews, poll for completion, dispatch aggregator.
#
# Triggers:
# 1. AWF fixer/iteration agent completes (workflow_run)
# 2. Copilot PR becomes ready for review (pull_request: ready_for_review)
# 3. Copilot pushes iteration commits (push to copilot/* branches)
#
# MAX_ITERATIONS guard in "Check if iteration needed" prevents infinite loops.

on:
  workflow_run:
    workflows: ["Fix Issue Agent", "Fix Iteration Agent", "Copilot coding agent"]
    types: [completed]
  pull_request:
    types: [ready_for_review]
  push:
    branches:
      - 'copilot/**'

# Prevent parallel orchestrators for the same branch (proxy for same PR)
concurrency:
  group: review-orchestrator-${{ github.event.workflow_run.head_branch || github.head_ref || github.ref_name }}
  cancel-in-progress: false

jobs:
  orchestrate-reviews:
    # For workflow_run: only on success
    # For pull_request/push: always run (guards below filter non-Copilot PRs)
    if: >-
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'pull_request' ||
      github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Find PR
        id: find-pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            # Copilot PR ready for review
            AUTHOR="${{ github.event.pull_request.user.login }}"
            if [[ "$AUTHOR" != "copilot-swe-agent[bot]" ]]; then
              echo "Not a Copilot PR (author: $AUTHOR), skipping"
              echo "found=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            PR_NUM="${{ github.event.pull_request.number }}"
            FILES="${{ github.event.pull_request.changed_files }}"
            if [ "$FILES" -eq 0 ] 2>/dev/null; then
              echo "Copilot PR #$PR_NUM has no files yet, skipping"
              echo "found=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Copilot PR #$PR_NUM ready for review ($FILES files)"
            # Add ai:copilot-fix label if not present
            gh api "repos/${{ github.repository }}/issues/$PR_NUM/labels" \
              -X POST --input - <<< '{"labels":["ai:copilot-fix"]}' > /dev/null 2>&1 || true
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"

          elif [ "${{ github.event_name }}" == "push" ]; then
            # Push to copilot/* branch — find associated open PR
            BRANCH="${{ github.ref_name }}"
            echo "Push to branch: $BRANCH"
            PR_NUM=$(gh api "repos/${{ github.repository }}/pulls?state=open&head=${{ github.repository_owner }}:$BRANCH&per_page=1" \
              --jq '.[0].number // empty')
            if [ -z "$PR_NUM" ]; then
              echo "No open PR for branch $BRANCH"
              echo "found=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            AUTHOR=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUM" --jq '.user.login')
            if [[ "$AUTHOR" != "copilot-swe-agent[bot]" ]]; then
              echo "PR #$PR_NUM not by Copilot (author: $AUTHOR), skipping"
              echo "found=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Copilot iteration push to PR #$PR_NUM"
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"

          else
            # workflow_run trigger (AWF fixer/iteration agent OR Copilot coding agent)
            RUN_ID="${{ github.event.workflow_run.id }}"
            WF_NAME="${{ github.event.workflow_run.name }}"
            echo "Fixer run: $RUN_ID (workflow: $WF_NAME)"

            if [[ "$WF_NAME" == "Copilot coding agent" ]]; then
              # Copilot coding agent — find PR by branch name from run
              BRANCH="${{ github.event.workflow_run.head_branch }}"
              echo "Copilot run on branch: $BRANCH"
              PR_NUM=$(gh api "repos/${{ github.repository }}/pulls?state=open&head=${{ github.repository_owner }}:$BRANCH&per_page=1" \
                --jq '.[0].number // empty')
              if [ -z "$PR_NUM" ]; then
                echo "No open PR for Copilot branch $BRANCH"
                echo "found=false" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              # Verify it's a Copilot PR with files
              AUTHOR=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUM" --jq '.user.login')
              FILES=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUM" --jq '.changed_files')
              if [[ "$AUTHOR" != "copilot-swe-agent[bot]" ]]; then
                echo "PR #$PR_NUM not by Copilot (author: $AUTHOR), skipping"
                echo "found=false" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              if [ "$FILES" -eq 0 ] 2>/dev/null; then
                echo "Copilot PR #$PR_NUM has no files yet, skipping"
                echo "found=false" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              echo "Copilot PR #$PR_NUM ($FILES files) ready for review"
              # Add ai:copilot-fix label
              gh api "repos/${{ github.repository }}/issues/$PR_NUM/labels" \
                -X POST --input - <<< '{"labels":["ai:copilot-fix"]}' > /dev/null 2>&1 || true
            else
              # AWF fixer/iteration agent — find PR by label
              PR_NUM=$(gh api "repos/${{ github.repository }}/pulls?state=open&sort=created&direction=desc&per_page=5" \
                --jq '[.[] | select(.labels | map(.name) | index("ai:agent-fix"))] | .[0].number // empty')
              if [ -z "$PR_NUM" ]; then
                echo "No ai:agent-fix PR found"
                echo "found=false" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              echo "AWF PR #$PR_NUM"
            fi

            echo "Found PR #$PR_NUM"
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"

      - name: Dispatch Code Review
        if: steps.find-pr.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ steps.find-pr.outputs.pr_number }}"
          echo "Dispatching Code Review for PR #$PR_NUM"
          gh workflow run code-review.lock.yml \
            -R "${{ github.repository }}" \
            -f "pr_number=$PR_NUM"
          echo "✅ Code Review dispatched"

      - name: Dispatch API Review
        if: steps.find-pr.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ steps.find-pr.outputs.pr_number }}"
          echo "Dispatching API Surface Review for PR #$PR_NUM"
          gh workflow run api-review.lock.yml \
            -R "${{ github.repository }}" \
            -f "pr_number=$PR_NUM"
          echo "✅ API Surface Review dispatched"

      - name: Dispatch Security Review
        if: steps.find-pr.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ steps.find-pr.outputs.pr_number }}"
          echo "Dispatching Security Review for PR #$PR_NUM"
          gh workflow run security-review.lock.yml \
            -R "${{ github.repository }}" \
            -f "pr_number=$PR_NUM"
          echo "✅ Security Review dispatched"

      - name: Wait for all reviews to complete
        if: steps.find-pr.outputs.found == 'true'
        id: wait-reviews
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ steps.find-pr.outputs.pr_number }}"

          # Get PR head SHA to verify comments are for current commit
          HEAD_SHA=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUM" --jq '.head.sha')
          echo "PR #$PR_NUM HEAD: $HEAD_SHA"

          # Record comment count at dispatch time — new reviews will appear after this
          BASELINE_COUNT=$(gh api "repos/${{ github.repository }}/issues/$PR_NUM/comments?per_page=100" --jq 'length')
          echo "Baseline comment count: $BASELINE_COUNT"

          # Poll for review comments by marker (not run ID).
          # This is immune to run-ID capture races and phantom hangs.
          echo "Waiting for review comments on PR #$PR_NUM..."

          CR_DONE=false
          AR_DONE=false
          SR_DONE=false

          for i in $(seq 1 50); do
            COMMENTS=$(gh api "repos/${{ github.repository }}/issues/$PR_NUM/comments?per_page=100" \
              --jq '[.[] | {body: .body, created: .created_at}]')

            if [ "$CR_DONE" = "false" ]; then
              CR_FOUND=$(echo "$COMMENTS" | jq '[.[] | select(.body | contains("gh-aw-agentic-workflow: Code Review"))] | length')
              if [ "$CR_FOUND" -gt 0 ]; then
                CR_DONE=true
                echo "✅ Code Review comment found"
              fi
            fi

            if [ "$AR_DONE" = "false" ]; then
              AR_FOUND=$(echo "$COMMENTS" | jq '[.[] | select(.body | contains("gh-aw-agentic-workflow: API Surface Review") or contains("gh-aw-agentic-workflow: API Review"))] | length')
              if [ "$AR_FOUND" -gt 0 ]; then
                AR_DONE=true
                echo "✅ API Review comment found"
              fi
            fi

            if [ "$SR_DONE" = "false" ]; then
              SR_FOUND=$(echo "$COMMENTS" | jq '[.[] | select(.body | contains("gh-aw-security-review"))] | length')
              if [ "$SR_FOUND" -gt 0 ]; then
                SR_DONE=true
                echo "✅ Security Review comment found"
              fi
            fi

            if [ "$CR_DONE" = "true" ] && [ "$AR_DONE" = "true" ] && [ "$SR_DONE" = "true" ]; then
              echo "All reviews completed!"
              exit 0
            fi

            # After 30 min, proceed with whatever we have (don't block forever)
            if [ "$i" -ge 30 ]; then
              HAVE_ANY=false
              [ "$CR_DONE" = "true" ] && HAVE_ANY=true
              [ "$AR_DONE" = "true" ] && HAVE_ANY=true
              [ "$SR_DONE" = "true" ] && HAVE_ANY=true
              if [ "$HAVE_ANY" = "true" ]; then
                echo "::warning::Timeout after 30 min, proceeding with partial reviews (CR=$CR_DONE AR=$AR_DONE SR=$SR_DONE)"
                exit 0
              fi
            fi

            echo "Poll $i/50: CR=$CR_DONE AR=$AR_DONE SR=$SR_DONE (sleeping 60s)"
            sleep 60
          done

          echo "::warning::Timed out waiting for reviews after 50 min"
          exit 1

      # ── Phase 2: Dispatch Aggregator ───────────────────────────

      - name: Dispatch Review Aggregator
        if: steps.find-pr.outputs.found == 'true'
        id: dispatch-agg
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ steps.find-pr.outputs.pr_number }}"
          echo "Dispatching Review Aggregator for PR #$PR_NUM"
          gh workflow run review-aggregator.lock.yml \
            -R "${{ github.repository }}" \
            -f "pr_number=$PR_NUM"
          echo "✅ Aggregator dispatched"

          sleep 15
          AGG_RUN=$(gh api "repos/${{ github.repository }}/actions/workflows/review-aggregator.lock.yml/runs?per_page=5" \
            --jq '[.workflow_runs[] | select(.status != "completed") | select(.created_at > (now - 120 | todate))] | .[0].id // empty' 2>/dev/null || true)
          echo "Aggregator run ID: $AGG_RUN"
          echo "run_id=$AGG_RUN" >> "$GITHUB_OUTPUT"

      - name: Wait for aggregator to complete
        if: steps.find-pr.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          AGG_RUN="${{ steps.dispatch-agg.outputs.run_id }}"
          echo "Waiting for Aggregator ($AGG_RUN)..."

          for i in $(seq 1 20); do
            if [ -n "$AGG_RUN" ]; then
              STATUS=$(gh api "repos/${{ github.repository }}/actions/runs/$AGG_RUN" --jq '.status' 2>/dev/null || echo "unknown")
              if [ "$STATUS" = "completed" ]; then
                CONCLUSION=$(gh api "repos/${{ github.repository }}/actions/runs/$AGG_RUN" --jq '.conclusion' 2>/dev/null)
                echo "✅ Aggregator completed: $CONCLUSION"
                exit 0
              fi
            fi

            echo "Poll $i/20: status=$STATUS (sleeping 30s)"
            sleep 30
          done

          echo "::warning::Timed out waiting for aggregator after 10 min"
          exit 1

      # ── Phase 3: Dispatch Iteration (if needed) ────────────────

      - name: Check if iteration needed
        if: steps.find-pr.outputs.found == 'true'
        id: check-iteration
        env:
          GH_TOKEN: ${{ github.token }}
          MAX_ITERATIONS: 3
        run: |
          PR_NUM="${{ steps.find-pr.outputs.pr_number }}"

          LABELS=$(gh api "repos/${{ github.repository }}/issues/$PR_NUM/labels" \
            --jq '[.[].name] | join(",")')
          echo "PR #$PR_NUM labels: $LABELS"

          if ! echo "$LABELS" | grep -q "ai:needs-iteration"; then
            echo "No ai:needs-iteration label — pipeline complete"
            echo "needs_iteration=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check iteration count
          ITER_COUNT=$(gh api "repos/${{ github.repository }}/issues/$PR_NUM/comments?per_page=100" \
            --jq '[.[] | select(.body | test("Iteration.*Applied|push_to_pull_request"; "i"))] | length')
          echo "Iteration count: $ITER_COUNT (max: $MAX_ITERATIONS)"

          if [ "$ITER_COUNT" -ge "$MAX_ITERATIONS" ]; then
            echo "Max iterations reached — stopping loop"
            gh api "repos/${{ github.repository }}/issues/$PR_NUM/labels" \
              -X POST --input - <<< '{"labels":["ai:max-iterations-reached"]}' > /dev/null
            echo "needs_iteration=false" >> "$GITHUB_OUTPUT"
          else
            echo "needs_iteration=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract fix instructions
        if: steps.check-iteration.outputs.needs_iteration == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ steps.find-pr.outputs.pr_number }}"

          # Only extract from trusted reviewer comments (identified by HTML markers)
          # This prevents prompt injection from arbitrary PR comments
          BODY=$(gh api "repos/${{ github.repository }}/issues/$PR_NUM/comments?per_page=100" \
            --jq '[.[] | select(.body | (contains("gh-aw-agentic-workflow:") or contains("gh-aw-security-review") or contains("gh-aw-review-aggregator")))] | map(.body) | join("\n\n---\n\n") // empty')

          if [ -z "$BODY" ] || [ "$BODY" = "null" ]; then
            BODY="Address the review feedback on this PR. Read the review comments carefully and fix all issues identified."
          fi

          echo "$BODY" | head -c 65000 > /tmp/fix_instructions.txt

      - name: Detect fixer type
        if: steps.check-iteration.outputs.needs_iteration == 'true'
        id: fixer-type
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ steps.find-pr.outputs.pr_number }}"
          PR_AUTHOR=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUM" --jq '.user.login')
          echo "PR #$PR_NUM author: $PR_AUTHOR"
          if [[ "$PR_AUTHOR" == "copilot-swe-agent[bot]" ]]; then
            echo "fixer=copilot" >> "$GITHUB_OUTPUT"
          else
            echo "fixer=awf" >> "$GITHUB_OUTPUT"
          fi

      - name: Post @copilot iteration comment
        if: steps.check-iteration.outputs.needs_iteration == 'true' && steps.fixer-type.outputs.fixer == 'copilot'
        env:
          GH_TOKEN: ${{ secrets.GH_AW_CI_TRIGGER_TOKEN }}
        run: |
          PR_NUM="${{ steps.find-pr.outputs.pr_number }}"
          INSTRUCTIONS=$(cat /tmp/fix_instructions.txt | head -c 30000)

          COMMENT="@copilot Please address the following review feedback:

          ${INSTRUCTIONS}

          ## Instructions
          1. Fix each issue listed above.
          2. Rebuild and verify tests pass.
          3. Do NOT revert previous changes unless a reviewer specifically asked for a revert.
          4. Push your changes to this PR branch."

          COMMENT=$(echo "$COMMENT" | sed 's/^          //')

          gh api "repos/${{ github.repository }}/issues/$PR_NUM/comments" \
            -X POST -f body="$COMMENT"
          echo "✅ Posted @copilot iteration comment on PR #$PR_NUM"

      - name: Dispatch AWF iteration agent
        if: steps.check-iteration.outputs.needs_iteration == 'true' && steps.fixer-type.outputs.fixer == 'awf'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ steps.find-pr.outputs.pr_number }}"
          INSTRUCTIONS=$(cat /tmp/fix_instructions.txt)

          echo "Dispatching AWF iteration agent for PR #$PR_NUM"
          gh workflow run agentic-fix-iterate.lock.yml \
            -R "${{ github.repository }}" \
            -f "pr_number=$PR_NUM" \
            -f "fix_instructions=$INSTRUCTIONS" \
            -f "upstream_repo=dotnet/runtime"
          echo "✅ AWF iteration agent dispatched for PR #$PR_NUM"
