name: Dispatch Reviews After Fixer
# Orchestrates the full review pipeline for AI-generated PRs.

# Full orchestrator: dispatch reviews, poll for completion, dispatch aggregator.
#
# Triggers:
# 1. AWF fixer/iteration agent completes (workflow_run)
# 2. Copilot PR becomes ready for review (pull_request: ready_for_review)
# 3. Copilot pushes iteration commits (push to copilot/* branches)
#
# MAX_ITERATIONS guard in "Check if iteration needed" prevents infinite loops.

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to run the full review pipeline on"
        required: true
        type: string
  workflow_run:
    workflows: ["Fix Issue Agent", "Fix Iteration Agent", "Copilot coding agent"]
    types: [completed]
  pull_request:
    types: [ready_for_review]
  push:
    branches:
      - 'copilot/**'

# Prevent parallel orchestrators for the same branch/PR. Cancel stale runs
# so a newer push doesn't race with an older orchestrator.
concurrency:
  group: review-orchestrator-${{ github.event.workflow_run.head_branch || inputs.pr_number || github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  orchestrate-reviews:
    # For workflow_run: only on success
    # For pull_request/push: always run (guards below filter non-Copilot PRs)
    if: >-
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'pull_request' ||
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Find PR
        id: find-pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # Manual trigger with explicit PR number
            PR_NUM="${{ inputs.pr_number }}"
            echo "Manual dispatch for PR #$PR_NUM"
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"

          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            # Copilot PR ready for review
            AUTHOR="${{ github.event.pull_request.user.login }}"
            if [ -z "$AUTHOR" ]; then
              echo "::error::Could not determine PR author"
              echo "found=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [[ "$AUTHOR" != "copilot-swe-agent[bot]" && "$AUTHOR" != "Copilot" ]]; then
              echo "Not a Copilot PR (author: $AUTHOR), skipping"
              echo "found=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            PR_NUM="${{ github.event.pull_request.number }}"
            FILES="${{ github.event.pull_request.changed_files }}"
            if [ "$FILES" -eq 0 ] 2>/dev/null; then
              echo "Copilot PR #$PR_NUM has no files yet, skipping"
              echo "found=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Copilot PR #$PR_NUM ready for review ($FILES files)"
            # Add ai:copilot-fix label if not present
            gh api "repos/${{ github.repository }}/issues/$PR_NUM/labels" \
              -X POST --input - <<< '{"labels":["ai:copilot-fix"]}' > /dev/null 2>&1 || true
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"

          elif [ "${{ github.event_name }}" == "push" ]; then
            # Push to copilot/* branch — find associated open PR
            BRANCH="${{ github.ref_name }}"
            echo "Push to branch: $BRANCH"
            PR_NUM=$(gh api "repos/${{ github.repository }}/pulls?state=open&head=${{ github.repository_owner }}:$BRANCH&per_page=1" \
              --jq '.[0].number // empty')
            if [ -z "$PR_NUM" ]; then
              echo "No open PR for branch $BRANCH"
              echo "found=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            AUTHOR=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUM" --jq '.user.login // empty')
            if [ -z "$AUTHOR" ]; then
              echo "::error::Could not determine PR author for PR #$PR_NUM"
              echo "found=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [[ "$AUTHOR" != "copilot-swe-agent[bot]" && "$AUTHOR" != "Copilot" ]]; then
              echo "PR #$PR_NUM not by Copilot (author: $AUTHOR), skipping"
              echo "found=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Copilot iteration push to PR #$PR_NUM"
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"

          else
            # workflow_run trigger (AWF fixer/iteration agent OR Copilot coding agent)
            RUN_ID="${{ github.event.workflow_run.id }}"
            WF_NAME="${{ github.event.workflow_run.name }}"
            echo "Fixer run: $RUN_ID (workflow: $WF_NAME)"

            if [[ "$WF_NAME" == "Copilot coding agent" ]]; then
              # Copilot coding agent — find PR by branch name from run
              BRANCH="${{ github.event.workflow_run.head_branch }}"
              echo "Copilot run on branch: $BRANCH"
              PR_NUM=$(gh api "repos/${{ github.repository }}/pulls?state=open&head=${{ github.repository_owner }}:$BRANCH&per_page=1" \
                --jq '.[0].number // empty')
              if [ -z "$PR_NUM" ]; then
                echo "No open PR for Copilot branch $BRANCH"
                echo "found=false" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              # Verify it's a Copilot PR with files
              AUTHOR=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUM" --jq '.user.login // empty')
              FILES=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUM" --jq '.changed_files')
              if [ -z "$AUTHOR" ]; then
                echo "::error::Could not determine PR author for PR #$PR_NUM"
                echo "found=false" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              if [[ "$AUTHOR" != "copilot-swe-agent[bot]" && "$AUTHOR" != "Copilot" ]]; then
                echo "PR #$PR_NUM not by Copilot (author: $AUTHOR), skipping"
                echo "found=false" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              if [ "$FILES" -eq 0 ] 2>/dev/null; then
                echo "Copilot PR #$PR_NUM has no files yet, skipping"
                echo "found=false" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              echo "Copilot PR #$PR_NUM ($FILES files) ready for review"
              # Add ai:copilot-fix label
              gh api "repos/${{ github.repository }}/issues/$PR_NUM/labels" \
                -X POST --input - <<< '{"labels":["ai:copilot-fix"]}' > /dev/null 2>&1 || true
            else
              # AWF fixer/iteration agent — find PR by triggering run's branch
              AWF_BRANCH="${{ github.event.workflow_run.head_branch }}"
              echo "AWF run on branch: $AWF_BRANCH"
              # Try to find PR by branch first (more reliable than label-based lookup)
              PR_NUM=$(gh api "repos/${{ github.repository }}/pulls?state=open&head=${{ github.repository_owner }}:${AWF_BRANCH}&per_page=1" \
                --jq '.[0].number // empty')
              if [ -z "$PR_NUM" ]; then
                # Fallback: find by ai:agent-fix label (most recent)
                echo "No PR for branch $AWF_BRANCH, falling back to label lookup"
                PR_NUM=$(gh api "repos/${{ github.repository }}/pulls?state=open&sort=created&direction=desc&per_page=5" \
                  --jq '[.[] | select(.labels | map(.name) | index("ai:agent-fix"))] | .[0].number // empty')
              fi
              if [ -z "$PR_NUM" ]; then
                echo "No ai:agent-fix PR found"
                echo "found=false" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              echo "AWF PR #$PR_NUM"
            fi

            echo "Found PR #$PR_NUM"
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch Code Review
        if: steps.find-pr.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ steps.find-pr.outputs.pr_number }}"
          echo "Dispatching Code Review for PR #$PR_NUM"
          gh workflow run code-review.lock.yml \
            -R "${{ github.repository }}" \
            -f "pr_number=$PR_NUM"
          echo "✅ Code Review dispatched"

      - name: Dispatch API Review
        if: steps.find-pr.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ steps.find-pr.outputs.pr_number }}"
          echo "Dispatching API Surface Review for PR #$PR_NUM"
          gh workflow run api-review.lock.yml \
            -R "${{ github.repository }}" \
            -f "pr_number=$PR_NUM"
          echo "✅ API Surface Review dispatched"

      - name: Dispatch Security Review
        if: steps.find-pr.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ steps.find-pr.outputs.pr_number }}"
          echo "Dispatching Security Review for PR #$PR_NUM"
          gh workflow run security-review.lock.yml \
            -R "${{ github.repository }}" \
            -f "pr_number=$PR_NUM"
          echo "✅ Security Review dispatched"

      - name: Wait for all reviews to complete
        if: steps.find-pr.outputs.found == 'true'
        id: wait-reviews
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ steps.find-pr.outputs.pr_number }}"

          # Get PR head SHA to verify comments are for current commit
          HEAD_SHA=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUM" --jq '.head.sha')
          echo "PR #$PR_NUM HEAD: $HEAD_SHA"

          # Capture dispatch timestamp — only trust comments created after this
          DISPATCH_TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "Dispatch timestamp: $DISPATCH_TS"

          # Poll for review comments by marker + author + timestamp.
          # Only trust comments from github-actions[bot] created after dispatch.
          echo "Waiting for review comments on PR #$PR_NUM..."

          CR_DONE=false
          AR_DONE=false
          SR_DONE=false

          for i in $(seq 1 50); do
            # Fetch comments with author and timestamp, filter to trusted+fresh
            COMMENTS=$(gh api "repos/${{ github.repository }}/issues/$PR_NUM/comments?per_page=100" \
              --jq "[.[] | select(.user.login == \"github-actions[bot]\" and .created_at > \"$DISPATCH_TS\") | {body: .body}]")

            if [ "$CR_DONE" = "false" ]; then
              CR_FOUND=$(echo "$COMMENTS" | jq '[.[] | select(.body | contains("gh-aw-agentic-workflow: Code Review"))] | length')
              if [ "$CR_FOUND" -gt 0 ]; then
                CR_DONE=true
                echo "✅ Code Review comment found (trusted, post-dispatch)"
              fi
            fi

            if [ "$AR_DONE" = "false" ]; then
              AR_FOUND=$(echo "$COMMENTS" | jq '[.[] | select(.body | contains("gh-aw-agentic-workflow: API Surface Review") or contains("gh-aw-agentic-workflow: API Review"))] | length')
              if [ "$AR_FOUND" -gt 0 ]; then
                AR_DONE=true
                echo "✅ API Review comment found (trusted, post-dispatch)"
              fi
            fi

            if [ "$SR_DONE" = "false" ]; then
              SR_FOUND=$(echo "$COMMENTS" | jq '[.[] | select(.body | contains("gh-aw-agentic-workflow: Security Review"))] | length')
              if [ "$SR_FOUND" -gt 0 ]; then
                SR_DONE=true
                echo "✅ Security Review comment found (trusted, post-dispatch)"
              fi
            fi

            if [ "$CR_DONE" = "true" ] && [ "$AR_DONE" = "true" ] && [ "$SR_DONE" = "true" ]; then
              echo "All reviews completed!"
              exit 0
            fi

            # After 30 min, proceed with whatever we have (don't block forever)
            if [ "$i" -ge 30 ]; then
              HAVE_ANY=false
              [ "$CR_DONE" = "true" ] && HAVE_ANY=true
              [ "$AR_DONE" = "true" ] && HAVE_ANY=true
              [ "$SR_DONE" = "true" ] && HAVE_ANY=true
              if [ "$HAVE_ANY" = "true" ]; then
                echo "::warning::Timeout after 30 min, proceeding with partial reviews (CR=$CR_DONE AR=$AR_DONE SR=$SR_DONE)"
                exit 0
              fi
            fi

            echo "Poll $i/50: CR=$CR_DONE AR=$AR_DONE SR=$SR_DONE (sleeping 60s)"
            sleep 60
          done

          echo "::warning::Timed out waiting for reviews after 50 min"
          exit 1

      # ── Phase 2: Dispatch Aggregator ───────────────────────────

      - name: Clean stale ai labels before aggregation
        if: steps.find-pr.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ steps.find-pr.outputs.pr_number }}"
          # Remove previous outcome/confidence labels so aggregator starts clean
          for LABEL in ai:ready-for-human ai:needs-iteration ai:failed ai:high-confidence ai:medium-confidence ai:low-confidence ai:has-breaking-concern ai:has-perf-concern ai:security-notice; do
            gh api "repos/${{ github.repository }}/issues/$PR_NUM/labels/$LABEL" -X DELETE 2>/dev/null || true
          done
          echo "Cleaned stale ai: labels from PR #$PR_NUM"

      - name: Dispatch Review Aggregator
        if: steps.find-pr.outputs.found == 'true'
        id: dispatch-agg
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ steps.find-pr.outputs.pr_number }}"
          echo "Dispatching Review Aggregator for PR #$PR_NUM"

          # Record dispatch timestamp for aggregator
          AGG_DISPATCH_TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "Aggregator dispatch timestamp: $AGG_DISPATCH_TS"
          echo "agg_dispatch_ts=$AGG_DISPATCH_TS" >> "$GITHUB_OUTPUT"

          gh workflow run review-aggregator.lock.yml \
            -R "${{ github.repository }}" \
            -f "pr_number=$PR_NUM"
          echo "✅ Aggregator dispatched"

      - name: Wait for aggregator to complete
        if: steps.find-pr.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ steps.find-pr.outputs.pr_number }}"
          AGG_TS="${{ steps.dispatch-agg.outputs.agg_dispatch_ts }}"
          echo "Waiting for new aggregator comment on PR #$PR_NUM (after $AGG_TS)..."

          # Poll for aggregator comment from trusted author after dispatch timestamp
          for i in $(seq 1 20); do
            sleep 30
            FOUND=$(gh api "repos/${{ github.repository }}/issues/$PR_NUM/comments?per_page=100" \
              --jq "[.[] | select(.user.login == \"github-actions[bot]\" and .created_at > \"$AGG_TS\" and (.body | contains(\"gh-aw-agentic-workflow: Review Aggregator\")))] | length" 2>/dev/null || echo "0")
            echo "Poll $i/20: trusted post-dispatch aggregator comments=$FOUND"
            if [ "$FOUND" -gt 0 ]; then
              echo "✅ New aggregator comment detected (trusted, post-dispatch)"
              exit 0
            fi
          done

          echo "::warning::Timed out waiting for aggregator after 10 min"
          exit 1

      # ── Phase 3: Dispatch Iteration (if needed) ────────────────

      - name: Check if iteration needed
        if: steps.find-pr.outputs.found == 'true'
        id: check-iteration
        env:
          GH_TOKEN: ${{ github.token }}
          MAX_ITERATIONS: 3
        run: |
          PR_NUM="${{ steps.find-pr.outputs.pr_number }}"

          LABELS=$(gh api "repos/${{ github.repository }}/issues/$PR_NUM/labels" \
            --jq '[.[].name] | join(",")')
          echo "PR #$PR_NUM labels: $LABELS"

          if ! echo "$LABELS" | grep -q "ai:needs-iteration"; then
            echo "No ai:needs-iteration label — pipeline complete"
            echo "needs_iteration=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Count iterations by timeline labeled events (tamper-resistant — survives label removal)
          ITER_COUNT=$(gh api "repos/${{ github.repository }}/issues/$PR_NUM/timeline?per_page=100" \
            --jq '[.[] | select(.event == "labeled" and (.label.name | test("^ai:iteration-")))] | length')
          echo "Iteration count (from timeline): $ITER_COUNT (max: $MAX_ITERATIONS)"

          if [ "$ITER_COUNT" -ge "$MAX_ITERATIONS" ]; then
            echo "Max iterations reached — stopping loop"
            gh api "repos/${{ github.repository }}/issues/$PR_NUM/labels" \
              -X POST --input - <<< '{"labels":["ai:max-iterations-reached"]}' > /dev/null
            echo "needs_iteration=false" >> "$GITHUB_OUTPUT"
          else
            # Stamp this iteration with a label
            NEXT_ITER=$((ITER_COUNT + 1))
            gh api "repos/${{ github.repository }}/issues/$PR_NUM/labels" \
              -X POST --input - <<< "{\"labels\":[\"ai:iteration-${NEXT_ITER}\"]}" > /dev/null
            echo "Stamped ai:iteration-${NEXT_ITER}"
            echo "needs_iteration=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract fix instructions
        if: steps.check-iteration.outputs.needs_iteration == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ steps.find-pr.outputs.pr_number }}"

          # Only extract from trusted reviewer comments:
          # 1. Must contain the gh-aw-agentic-workflow HTML marker (added by the gh-aw framework)
          # 2. Must be authored by github-actions[bot]
          # This double-check prevents prompt injection even if an attacker can forge HTML comment markers
          TRUSTED_AUTHORS='github-actions[bot]'
          BODY=$(gh api "repos/${{ github.repository }}/issues/$PR_NUM/comments?per_page=100" \
            --jq "[.[] | select(
              (.user.login == \"${TRUSTED_AUTHORS}\") and
              (.body | contains(\"gh-aw-agentic-workflow:\"))
            )] | map(.body) | join(\"\n\n---\n\n\") // empty")

          if [ -z "$BODY" ] || [ "$BODY" = "null" ]; then
            BODY="Address the review feedback on this PR. Read the review comments carefully and fix all issues identified."
          fi

          echo "$BODY" | head -c 65000 > "$RUNNER_TEMP/fix_instructions.txt"

      - name: Detect fixer type
        if: steps.check-iteration.outputs.needs_iteration == 'true'
        id: fixer-type
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ steps.find-pr.outputs.pr_number }}"
          PR_AUTHOR=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUM" --jq '.user.login')
          HEAD_BRANCH=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUM" --jq '.head.ref')
          echo "PR #$PR_NUM author: $PR_AUTHOR, branch: $HEAD_BRANCH"
          # Always use AWF iteration agent — @copilot mentions from bots don't trigger
          # Copilot. The AWF iterate agent can push to any branch including copilot/*.
          echo "fixer=awf" >> "$GITHUB_OUTPUT"

      - name: Ensure ai:agent-fix label
        if: steps.check-iteration.outputs.needs_iteration == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ steps.find-pr.outputs.pr_number }}"
          # The iterate agent's safe-outputs requires ai:agent-fix on the PR
          # to allow push_to_pull_request_branch. PRs created by Copilot (native)
          # won't have this label — only AWF fixer-created PRs get it automatically.
          LABELS=$(gh api "repos/${{ github.repository }}/issues/$PR_NUM/labels" \
            --jq '[.[].name] | join(",")')
          if ! echo "$LABELS" | grep -q "ai:agent-fix"; then
            echo "Adding ai:agent-fix label to PR #$PR_NUM (required for iteration push)"
            gh api "repos/${{ github.repository }}/issues/$PR_NUM/labels" \
              -X POST --input - <<< '{"labels":["ai:agent-fix"]}' > /dev/null
          fi

      - name: Dispatch iteration agent
        if: steps.check-iteration.outputs.needs_iteration == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ steps.find-pr.outputs.pr_number }}"
          # The iterate agent reads full review comments directly from the PR.
          # We pass a brief summary here since workflow_dispatch inputs have a
          # strict size limit (~65KB total payload) and review comments can be huge.
          INSTRUCTIONS=$(cat "$RUNNER_TEMP/fix_instructions.txt" | head -c 8000)
          SUMMARY="Read the review comments on PR #${PR_NUM} for full details. Key points from reviews:"
          INSTRUCTIONS="${SUMMARY}
          $(echo "$INSTRUCTIONS" | head -c 7500)"

          echo "Dispatching iteration agent for PR #$PR_NUM (instructions: ${#INSTRUCTIONS} bytes)"
          gh workflow run agentic-fix-iterate.lock.yml \
            -R "${{ github.repository }}" \
            -f "pr_number=$PR_NUM" \
            -f "fix_instructions=$INSTRUCTIONS" \
            -f "upstream_repo=dotnet/runtime"
          echo "✅ Iteration agent dispatched for PR #$PR_NUM"
