# Library Tests — Download golden artifacts, rebuild one library, run its tests.
#
# Used by the agentic fix pipeline for per-fix CI. Also useful for manual
# validation. Runs Release and Debug in parallel.

name: Library Tests
on:
  workflow_dispatch:
    inputs:
      library:
        description: 'Library name (e.g., System.Text.Json)'
        required: true
      test_project:
        description: 'Test project path relative to repo root (e.g., src/libraries/System.Text.Json/tests/System.Text.Json.Tests/System.Text.Json.Tests.csproj)'
        required: true

permissions:
  contents: read

jobs:
  test-release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo rm -rf /usr/local/graalvm /usr/local/.ghcup /usr/local/share/powershell
          sudo docker image prune --all --force 2>/dev/null || true

      - name: Download golden artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "=== Downloading golden release ==="
          gh release download --pattern 'golden-part-*' --dir /tmp
          echo "=== Decompressing ==="
          cat /tmp/golden-part-* | zstd -d | tar xf - -C .
          echo "=== Done ==="
          df -h /

      - name: Build changed library (Release)
        run: |
          ./build.sh -subset libs -c Release \
            -projects src/libraries/${{ inputs.library }}/src/*.csproj

      - name: Run tests (Release)
        run: |
          ./build.sh -subset libs.tests -test -c Release \
            -projects ${{ inputs.test_project }}

  test-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo rm -rf /usr/local/graalvm /usr/local/.ghcup /usr/local/share/powershell
          sudo docker image prune --all --force 2>/dev/null || true

      - name: Download golden artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "=== Downloading golden release ==="
          gh release download --pattern 'golden-part-*' --dir /tmp
          echo "=== Decompressing ==="
          cat /tmp/golden-part-* | zstd -d | tar xf - -C .
          echo "=== Done ==="
          df -h /

      - name: Build changed library (Debug)
        run: |
          ./build.sh -subset libs -c Debug \
            -projects src/libraries/${{ inputs.library }}/src/*.csproj

      - name: Run tests (Debug)
        run: |
          ./build.sh -subset libs.tests -test -c Debug \
            -projects ${{ inputs.test_project }}
