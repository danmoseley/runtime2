# Library Tests — Download golden artifacts, rebuild one library, run its tests.
#
# Used by the agentic fix pipeline for per-fix CI. Also useful for manual
# validation. Release only (golden build doesn't include Debug testhost).

name: Library Tests
on:
  workflow_dispatch:
    inputs:
      library:
        description: 'Library name (e.g., System.Text.Json)'
        required: true
      test_project:
        description: 'Test project path relative to repo root (e.g., src/libraries/System.Text.Json/tests/System.Text.Json.Tests/System.Text.Json.Tests.csproj)'
        required: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo rm -rf /usr/local/graalvm /usr/local/.ghcup /usr/local/share/powershell
          sudo docker image prune --all --force 2>/dev/null || true

      - name: Download golden artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "=== Downloading golden release ==="
          GOLDEN_TAG=$(gh release list --repo ${{ github.repository }} --limit 1 --json tagName -q '.[0].tagName')
          echo "Using golden release: $GOLDEN_TAG"
          gh release download "$GOLDEN_TAG" --repo ${{ github.repository }} --pattern 'golden-part-*' --dir /tmp
          echo "=== Decompressing ==="
          cat /tmp/golden-part-* | zstd -d | tar xf - -C .
          echo "=== Done ==="
          df -h /

      - name: Build changed library (Release)
        run: |
          ./eng/common/dotnet.sh build src/libraries/${{ inputs.library }}/src/*.csproj -c Release

      - name: Run tests (Release)
        run: |
          ./eng/common/dotnet.sh build ${{ inputs.test_project }} /t:Test -c Release
