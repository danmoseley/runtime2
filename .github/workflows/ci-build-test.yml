name: CI Build and Test

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        configuration: [Release, Debug]
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Rebase on latest main
        run: |
          git config user.email "ci@bot"
          git config user.name "CI"
          git fetch origin main
          git rebase origin/main || {
            echo "::error::Rebase on main failed — merge conflicts"
            git rebase --abort
            exit 1
          }
          echo "Rebased on $(git rev-parse --short origin/main)"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc 2>/dev/null || true
          sudo rm -rf /usr/local/share/boost /usr/local/graalvm /usr/local/.ghcup 2>/dev/null || true
          sudo rm -rf /usr/local/share/powershell /opt/hostedtoolcache/CodeQL 2>/dev/null || true
          sudo rm -rf /opt/hostedtoolcache/go /opt/hostedtoolcache/node 2>/dev/null || true
          sudo docker image prune --all --force 2>/dev/null || true
          df -h /

      - name: Install build dependencies
        run: |
          sudo eng/common/native/install-dependencies.sh linux

      - name: Build CLR and libraries
        run: |
          ./build.sh -subset clr+libs -c ${{ matrix.configuration }}

      - name: Build and run all libraries tests
        run: |
          ./build.sh -subset libs.tests -test -c ${{ matrix.configuration }}
