name: Test Bot @copilot Trigger
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to comment on'
        required: true
        type: number

jobs:
  post-comment:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post @copilot comment as github-actions[bot]
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Posting @copilot comment on PR #${{ inputs.pr_number }} as github-actions[bot]..."
          gh api "repos/${{ github.repository }}/issues/${{ inputs.pr_number }}/comments" \
            --method POST \
            -f body="@copilot please address the review feedback on this PR."
          echo "Comment posted. Check if copilot_work_started event fires."
