name: Dispatch Iteration After Aggregator

# Fires when the Review Aggregator completes.
# Checks PR labels — if ai:needs-iteration is set, dispatches the iteration agent.

on:
  workflow_run:
    workflows: ["Review Aggregator"]
    types: [completed]

jobs:
  dispatch-iteration:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Find PR from aggregator run
        id: get-pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID="${{ github.event.workflow_run.id }}"
          echo "Aggregator run: $RUN_ID"

          # The aggregator is workflow_dispatch — inputs aren't in the API response.
          # Instead, find which PR has a fresh aggregator comment.
          # Search open PRs with ai: labels for the one the aggregator just processed.
          # The aggregator posts a comment containing "Review Aggregat" — find the most recent.
          
          # Get the run's display_title which includes the inputs
          DISPLAY_TITLE=$(gh api "repos/${{ github.repository }}/actions/runs/$RUN_ID" \
            --jq '.display_title // empty' 2>/dev/null || true)
          echo "Run display title: $DISPLAY_TITLE"

          # Try to extract PR number from display title (format often includes input values)
          PR_NUM=$(echo "$DISPLAY_TITLE" | grep -oP '\b\d+\b' | head -1 || true)

          # Validate: check this PR exists and has ai: labels
          if [ -n "$PR_NUM" ]; then
            PR_STATE=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUM" --jq '.state' 2>/dev/null || true)
            if [ "$PR_STATE" = "open" ]; then
              echo "Found PR #$PR_NUM from display title"
              echo "found=true" >> "$GITHUB_OUTPUT"
              echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # Fallback: search recent open PRs for one with a fresh aggregator comment
          echo "Searching open PRs for recent aggregator comment..."
          OPEN_PRS=$(gh api "repos/${{ github.repository }}/pulls?state=open&per_page=10" \
            --jq '.[].number' 2>/dev/null || true)

          for PR in $OPEN_PRS; do
            HAS_AGG=$(gh api "repos/${{ github.repository }}/issues/$PR/comments?per_page=5&sort=created&direction=desc" \
              --jq '[.[] | select(.body | test("Review Aggregat"; "i")) | select(.created_at > (now - 600 | todate))] | length' 2>/dev/null || echo "0")
            if [ "$HAS_AGG" -gt 0 ]; then
              echo "Found PR #$PR with recent aggregator comment"
              echo "found=true" >> "$GITHUB_OUTPUT"
              echo "pr_number=$PR" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          echo "Could not determine PR number from aggregator run"
          echo "found=false" >> "$GITHUB_OUTPUT"

      - name: Check PR labels and iteration count
        if: steps.get-pr.outputs.found == 'true'
        id: check-labels
        env:
          GH_TOKEN: ${{ github.token }}
          MAX_ITERATIONS: 3
        run: |
          PR_NUM="${{ steps.get-pr.outputs.pr_number }}"

          LABELS=$(gh api "repos/${{ github.repository }}/issues/$PR_NUM/labels" \
            --jq '[.[].name] | join(",")')
          echo "PR #$PR_NUM labels: $LABELS"

          if ! echo "$LABELS" | grep -q "ai:needs-iteration"; then
            echo "No ai:needs-iteration label — skipping iteration dispatch"
            echo "needs_iteration=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Count existing iteration comments to enforce max cap
          ITER_COUNT=$(gh api "repos/${{ github.repository }}/issues/$PR_NUM/comments?per_page=100" \
            --jq '[.[] | select(.body | test("Iteration: Review Feedback Applied"; "i"))] | length')
          echo "Iteration count so far: $ITER_COUNT (max: $MAX_ITERATIONS)"

          if [ "$ITER_COUNT" -ge "$MAX_ITERATIONS" ]; then
            echo "Max iterations ($MAX_ITERATIONS) reached — adding ai:max-iterations-reached label"
            gh api "repos/${{ github.repository }}/issues/$PR_NUM/labels" \
              -X POST --input - <<< '{"labels":["ai:max-iterations-reached"]}' > /dev/null
            gh api "repos/${{ github.repository }}/issues/$PR_NUM/comments" \
              -X POST --input - <<< "{\"body\":\"⚠️ **Max iterations reached ($MAX_ITERATIONS).** This PR needs human review to proceed.\n\nThe automated iteration loop has been stopped to prevent unbounded cost.\"}" > /dev/null
            echo "needs_iteration=false" >> "$GITHUB_OUTPUT"
          else
            echo "needs_iteration=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract fix instructions from aggregator comment
        if: steps.check-labels.outputs.needs_iteration == 'true'
        id: get-instructions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ steps.get-pr.outputs.pr_number }}"

          # Find the aggregator's most recent comment
          BODY=$(gh api "repos/${{ github.repository }}/issues/$PR_NUM/comments?per_page=100" \
            --jq '[.[] | select(.body | test("Review Aggregat"; "i"))] | last.body // empty')

          if [ -z "$BODY" ] || [ "$BODY" = "null" ]; then
            BODY="Address the review feedback on this PR. Read the review comments carefully and fix all issues identified."
          fi

          # Truncate to 65000 chars (workflow_dispatch input limit)
          echo "$BODY" | head -c 65000 > /tmp/fix_instructions.txt

      - name: Dispatch iteration agent
        if: steps.check-labels.outputs.needs_iteration == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ steps.get-pr.outputs.pr_number }}"
          INSTRUCTIONS=$(cat /tmp/fix_instructions.txt)

          echo "Dispatching iteration agent for PR #$PR_NUM"

          gh workflow run agentic-fix-iterate.lock.yml \
            -R "${{ github.repository }}" \
            -f "pr_number=$PR_NUM" \
            -f "fix_instructions=$INSTRUCTIONS" \
            -f "upstream_repo=dotnet/runtime"

          echo "✅ Iteration agent dispatched for PR #$PR_NUM"
