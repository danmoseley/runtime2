name: Dispatch Iteration After Aggregator

# DISABLED event-driven trigger: The sequential path in review-orchestrator.yml
# handles the full orchestration loop (reviews → aggregator → iteration)
# with correct PR tracking. This event-driven path caused multi-PR
# ambiguity bugs because lock.yml runs return inputs:null via API.
#
# Keep workflow_dispatch for manual debugging.

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to check for iteration'
        required: true
        type: string

jobs:
  dispatch-iteration:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Get PR number
        id: get-pr
        run: |
          PR_NUM="${{ inputs.pr_number }}"
          echo "Manual dispatch for PR #$PR_NUM"
          echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"

      - name: Check PR labels and iteration count
        id: check-labels
        env:
          GH_TOKEN: ${{ github.token }}
          MAX_ITERATIONS: 3
        run: |
          PR_NUM="${{ steps.get-pr.outputs.pr_number }}"

          LABELS=$(gh api "repos/${{ github.repository }}/issues/$PR_NUM/labels" \
            --jq '[.[].name] | join(",")')
          echo "PR #$PR_NUM labels: $LABELS"

          if ! echo "$LABELS" | grep -q "ai:needs-iteration"; then
            # Fallback: check if the aggregator synthesis comment indicates changes needed
            # This handles cases where the aggregator used wrong label names
            SYNTH_COMMENT=$(gh api "repos/${{ github.repository }}/issues/$PR_NUM/comments?per_page=100" \
              --jq '[.[] | select(.user.login == "github-actions[bot]" and (.body | contains("gh-aw-agentic-workflow: Review Aggregator")))] | last | .body // empty')
            if echo "$SYNTH_COMMENT" | grep -qi "needs.changes\|needs.iteration\|NEEDS ITERATION"; then
              echo "⚠️ No ai:needs-iteration label but aggregator synthesis says needs changes — proceeding anyway"
            else
              echo "No ai:needs-iteration label and no iteration signal in aggregator comment — skipping"
              echo "needs_iteration=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # Count iterations by ai:iteration-N labels (reliable, not regex-fragile)
          ITER_COUNT=$(gh api "repos/${{ github.repository }}/issues/$PR_NUM/labels" \
            --jq '[.[] | select(.name | test("^ai:iteration-"))] | length')
          echo "Iteration count so far: $ITER_COUNT (max: $MAX_ITERATIONS)"

          if [ "$ITER_COUNT" -ge "$MAX_ITERATIONS" ]; then
            echo "Max iterations ($MAX_ITERATIONS) reached — adding ai:max-iterations-reached label"
            gh api "repos/${{ github.repository }}/issues/$PR_NUM/labels" \
              -X POST --input - <<< '{"labels":["ai:max-iterations-reached"]}' > /dev/null
            gh api "repos/${{ github.repository }}/issues/$PR_NUM/comments" \
              -X POST --input - <<< "{\"body\":\"⚠️ **Max iterations reached ($MAX_ITERATIONS).** This PR needs human review to proceed.\n\nThe automated iteration loop has been stopped to prevent unbounded cost.\"}" > /dev/null
            echo "needs_iteration=false" >> "$GITHUB_OUTPUT"
          else
            echo "needs_iteration=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract fix instructions from review comments
        if: steps.check-labels.outputs.needs_iteration == 'true'
        id: get-instructions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ steps.get-pr.outputs.pr_number }}"

          # Find timestamp of most recent review cycle — use last ai:iteration-N label
          # or last ai:needs-iteration label as baseline. Only extract comments after that.
          BASELINE_TS=$(gh api "repos/${{ github.repository }}/issues/$PR_NUM/timeline?per_page=100" \
            --jq '[.[] | select(.event == "labeled" and (.label.name | test("^ai:(needs-iteration|iteration-)")))
                  ] | sort_by(.created_at) | last | .created_at // empty')

          if [ -z "$BASELINE_TS" ]; then
            # No iteration labels found — use 24h ago as safe fallback
            BASELINE_TS=$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ)
          fi
          echo "Extracting instructions from comments after: $BASELINE_TS"

          # Only extract from trusted reviewer comments (author + marker + freshness)
          TRUSTED_AUTHORS='github-actions[bot]'
          BODY=$(gh api "repos/${{ github.repository }}/issues/$PR_NUM/comments?per_page=100" \
            --jq "[.[] | select(
              (.user.login == \"${TRUSTED_AUTHORS}\") and
              (.created_at > \"${BASELINE_TS}\") and
              (.body | contains(\"gh-aw-agentic-workflow:\"))
            )] | map(.body) | join(\"\n\n---\n\n\") // empty")

          if [ -z "$BODY" ] || [ "$BODY" = "null" ]; then
            BODY="Address the review feedback on this PR. Read the review comments carefully and fix all issues identified."
          fi

          # Truncate to 65000 chars (workflow_dispatch input limit)
          echo "$BODY" | head -c 65000 > "$RUNNER_TEMP/fix_instructions.txt"

      - name: Detect fixer type
        if: steps.check-labels.outputs.needs_iteration == 'true'
        id: fixer-type
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ steps.get-pr.outputs.pr_number }}"
          PR_AUTHOR=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUM" --jq '.user.login')
          HEAD_BRANCH=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUM" --jq '.head.ref')
          echo "PR #$PR_NUM author: $PR_AUTHOR, branch: $HEAD_BRANCH"

          if [[ "$PR_AUTHOR" == "copilot-swe-agent[bot]" ]] || [[ "$PR_AUTHOR" == "Copilot" ]] || [[ "$HEAD_BRANCH" == copilot/* ]]; then
            echo "fixer=copilot" >> "$GITHUB_OUTPUT"
          else
            echo "fixer=awf" >> "$GITHUB_OUTPUT"
          fi

      - name: Post @copilot iteration comment
        if: steps.check-labels.outputs.needs_iteration == 'true' && steps.fixer-type.outputs.fixer == 'copilot'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ steps.get-pr.outputs.pr_number }}"
          INSTRUCTIONS=$(cat "$RUNNER_TEMP/fix_instructions.txt" | head -c 30000)

          COMMENT="@copilot Please address the following review feedback:

          ${INSTRUCTIONS}

          ## Instructions
          1. Fix each issue listed above.
          2. Rebuild and verify tests pass.
          3. Do NOT revert previous changes unless a reviewer specifically asked for a revert.
          4. Push your changes to this PR branch."

          COMMENT=$(echo "$COMMENT" | sed 's/^          //')

          gh api "repos/${{ github.repository }}/issues/$PR_NUM/comments" \
            -X POST -f body="$COMMENT"

          echo "✅ Posted @copilot iteration comment on PR #$PR_NUM"

      - name: Dispatch AWF iteration agent
        if: steps.check-labels.outputs.needs_iteration == 'true' && steps.fixer-type.outputs.fixer == 'awf'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ steps.get-pr.outputs.pr_number }}"
          # Truncate to avoid workflow_dispatch "inputs too large" (422) error.
          # The iterate agent reads full review comments from the PR directly.
          INSTRUCTIONS=$(cat "$RUNNER_TEMP/fix_instructions.txt" | head -c 8000)

          echo "Dispatching AWF iteration agent for PR #$PR_NUM (${#INSTRUCTIONS} bytes)"

          gh workflow run agentic-fix-iterate.lock.yml \
            -R "${{ github.repository }}" \
            -f "pr_number=$PR_NUM" \
            -f "fix_instructions=$INSTRUCTIONS" \
            -f "upstream_repo=dotnet/runtime"

          echo "✅ AWF iteration agent dispatched for PR #$PR_NUM"
