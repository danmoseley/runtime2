name: Auto-Dispatch Fixers from Selector

# Triggers when the Issue Selector Agent completes successfully.
# Parses its output issue for dispatch commands and triggers fixer workflows.

on:
  workflow_run:
    workflows: ["Issue Selector Agent"]
    types: [completed]
  issues:
    types: [opened]

jobs:
  dispatch:
    # Run if: (1) workflow_run from selector succeeded, OR (2) issue opened with "Issue Selection Report" in title
    if: >-
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'issues' && contains(github.event.issue.title, 'Issue Selection Report'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Find selector output issue
        id: find-issue
        env:
          GH_TOKEN: ${{ secrets.GH_AW_CI_TRIGGER_TOKEN }}
        run: |
          # Find the most recent open issue created by the selector
          # The selector creates issues with title starting with "Issue Selection Report"
          ISSUE=$(gh issue list -R "${{ github.repository }}" \
            --search "is:open Issue Selection Report" \
            --json number,title,body,createdAt \
            --jq 'sort_by(.createdAt) | reverse | .[0]')

          if [ -z "$ISSUE" ] || [ "$ISSUE" = "null" ]; then
            echo "No selector output issue found"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ISSUE_NUMBER=$(echo "$ISSUE" | jq -r '.number')
          echo "Found selector issue #$ISSUE_NUMBER"
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"

          # Extract the issue body and save it
          echo "$ISSUE" | jq -r '.body' > /tmp/selector_output.txt

      - name: Parse and dispatch fixers
        if: steps.find-issue.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_AW_CI_TRIGGER_TOKEN }}
        run: |
          echo "Parsing selector output for dispatch commands..."

          # Extract gh workflow run commands from the issue body
          # Format: gh workflow run agentic-fix-issue.md --repo REPO -f issue_number=N -f library=X -f test_project=Y
          DISPATCHES=$(grep -oP 'gh workflow run agentic-fix-issue\S*\s+--repo\s+\S+\s+.*' /tmp/selector_output.txt || true)

          if [ -z "$DISPATCHES" ]; then
            echo "No dispatch commands found in selector output"
            exit 0
          fi

          DISPATCH_COUNT=0
          while IFS= read -r cmd; do
            # Skip empty lines
            [ -z "$cmd" ] && continue

            # Extract parameters using regex
            ISSUE_NUM=$(echo "$cmd" | grep -oP '(?<=-f issue_number=)\d+' || true)
            LIBRARY=$(echo "$cmd" | grep -oP '(?<=-f library=)\S+' || true)
            TEST_PROJECT=$(echo "$cmd" | grep -oP "(?<=-f test_project=)[^\s]+" || true)

            if [ -z "$ISSUE_NUM" ] || [ -z "$LIBRARY" ]; then
              echo "Skipping malformed dispatch: $cmd"
              continue
            fi

            echo "Dispatching fixer for issue #$ISSUE_NUM (library: $LIBRARY)"

            # Use the lock.yml (compiled workflow) for dispatch
            gh workflow run agentic-fix-issue.lock.yml \
              -R "${{ github.repository }}" \
              -f "issue_number=$ISSUE_NUM" \
              -f "library=$LIBRARY" \
              -f "test_project=${TEST_PROJECT:-unknown}" \
              -f "upstream_repo=dotnet/runtime" || {
                echo "WARNING: Failed to dispatch fixer for issue #$ISSUE_NUM"
                continue
              }

            DISPATCH_COUNT=$((DISPATCH_COUNT + 1))
            echo "✅ Dispatched fixer for issue #$ISSUE_NUM"

            # Small delay between dispatches to avoid rate limiting
            sleep 2
          done <<< "$DISPATCHES"

          echo "Dispatched $DISPATCH_COUNT fixer(s)"

          # Add a comment to the selector issue noting dispatches
          if [ "$DISPATCH_COUNT" -gt 0 ]; then
            gh issue comment "${{ steps.find-issue.outputs.issue_number }}" \
              -R "${{ github.repository }}" \
              --body "🤖 Auto-dispatched $DISPATCH_COUNT fixer workflow(s) from this selection.

> [!NOTE]
> This comment was generated by the auto-dispatch workflow."
          fi
