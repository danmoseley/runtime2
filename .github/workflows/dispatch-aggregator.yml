name: Dispatch Aggregator After Reviews

# Fires when either Code Review or API Surface Review completes.
# Checks whether BOTH reviews have finished for the same PR.
# If so, dispatches the Review Aggregator.

on:
  workflow_run:
    workflows: ["Code Review", "API Surface Review"]
    types: [completed]

# Prevent duplicate dispatchers for the same PR
concurrency:
  group: dispatch-aggregator-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  dispatch-aggregator:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Get PR number from triggering workflow
        id: get-pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID="${{ github.event.workflow_run.id }}"
          WORKFLOW_NAME="${{ github.event.workflow_run.name }}"
          echo "Triggered by: $WORKFLOW_NAME (run $RUN_ID)"

          # Method 1: pull_request association
          PR_NUM=$(gh api "repos/${{ github.repository }}/actions/runs/$RUN_ID" \
            --jq '.pull_requests | if length > 0 then .[0].number else empty end' 2>/dev/null || true)

          # Method 2: workflow_dispatch inputs (null for lock.yml, but try)
          if [ -z "$PR_NUM" ]; then
            PR_NUM=$(gh api "repos/${{ github.repository }}/actions/runs/$RUN_ID" \
              --jq '.inputs.pr_number // empty' 2>/dev/null || true)
          fi

          # Method 3: display_title parsing
          if [ -z "$PR_NUM" ]; then
            PR_NUM=$(gh api "repos/${{ github.repository }}/actions/runs/$RUN_ID" \
              --jq '(.display_title | capture("PR #?(?<n>[0-9]+)") | .n) // empty' 2>/dev/null || true)
          fi

          # Method 4: Find most recent open PR with ai: label (fallback for lock.yml)
          if [ -z "$PR_NUM" ]; then
            echo "Lock.yml inputs not visible, searching for labeled PRs..."
            PR_NUM=$(gh api "repos/${{ github.repository }}/pulls?state=open&sort=updated&direction=desc&per_page=10" \
              --jq '[.[] | select(.labels | map(.name) | any(startswith("ai:")))] | .[0].number // empty')
          fi

          if [ -z "$PR_NUM" ]; then
            echo "No PR found for workflow run $RUN_ID"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "PR #$PR_NUM"
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"

      - name: Check if both reviews completed
        if: steps.get-pr.outputs.found == 'true'
        id: check-both
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ steps.get-pr.outputs.pr_number }}"

          # Check for completed Code Review runs (any event type)
          # Look at PR comments for review output instead of workflow runs
          CODE_REVIEW=$(gh api "repos/${{ github.repository }}/issues/$PR_NUM/comments" \
            --jq '[.[] | select(.body | contains("Code Review"))] | length')
          API_REVIEW=$(gh api "repos/${{ github.repository }}/issues/$PR_NUM/comments" \
            --jq '[.[] | select(.body | contains("API Surface Review") or contains("API Review"))] | length')

          echo "Code Review comments: $CODE_REVIEW"
          echo "API Review comments: $API_REVIEW"

          if [ "$CODE_REVIEW" -gt 0 ] && [ "$API_REVIEW" -gt 0 ]; then
            echo "Both reviews completed for PR #$PR_NUM"
            echo "both_done=true" >> "$GITHUB_OUTPUT"
          else
            echo "Waiting for both reviews to complete"
            echo "both_done=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check aggregator not already in-flight
        if: steps.check-both.outputs.both_done == 'true'
        id: check-dup
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Only skip if aggregator is currently running/queued (true duplicate).
          # Don't skip based on existing comments — re-runs after iteration are expected.
          RUNNING=$(gh api "repos/${{ github.repository }}/actions/workflows/review-aggregator.lock.yml/runs?status=in_progress" \
            --jq '.total_count' 2>/dev/null || echo "0")
          QUEUED=$(gh api "repos/${{ github.repository }}/actions/workflows/review-aggregator.lock.yml/runs?status=queued" \
            --jq '.total_count' 2>/dev/null || echo "0")

          echo "Running: $RUNNING, Queued: $QUEUED"

          if [ "$RUNNING" -gt 0 ] || [ "$QUEUED" -gt 0 ]; then
            echo "Aggregator already in-flight, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch aggregator
        if: steps.check-both.outputs.both_done == 'true' && steps.check-dup.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ steps.get-pr.outputs.pr_number }}"
          echo "Dispatching Review Aggregator for PR #$PR_NUM"

          gh workflow run review-aggregator.lock.yml \
            -R "${{ github.repository }}" \
            -f "pr_number=$PR_NUM"

          echo "✅ Aggregator dispatched for PR #$PR_NUM"
