name: Dispatch Aggregator After Reviews

# MANUAL-ONLY: The sequential path in dispatch-reviews.yml handles the full
# orchestration loop (reviews → aggregator → iteration) with correct PR
# tracking. This event-driven path was disabled because lock.yml runs
# return inputs:null via API, causing multi-PR ambiguity bugs.
#
# Use this for manual debugging only.

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to aggregate reviews for'
        required: true
        type: string

concurrency:
  group: dispatch-aggregator-${{ inputs.pr_number }}
  cancel-in-progress: false

jobs:
  dispatch-aggregator:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Dispatch aggregator
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ inputs.pr_number }}"
          echo "Dispatching Review Aggregator for PR #$PR_NUM"

          gh workflow run review-aggregator.lock.yml \
            -R "${{ github.repository }}" \
            -f "pr_number=$PR_NUM"

          echo "✅ Aggregator dispatched for PR #$PR_NUM"
